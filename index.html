<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Hug Day ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
    <h1 class="title">Happy Hug Day 🤗❤️</h1>
    <button class="btn" onclick="nextPage(2, event)">Next 💖</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
    <div class="message-box">
        <h2>My Love 💕</h2>
       <p id="typewriter"></p>
        <button class="btn" onclick="nextPage(3, event)">
            Click me whenever you need a hug 🤗
        </button>
    </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
    <div class="hug-container">
        <img 
        src="https://media.tenor.com/3G9Yz1qX9jQAAAAC/cute-hug-love.gif" 
        class="hug-gif"
        onerror="this.src='https://media.tenor.com/Qr6Z2KX0y5QAAAAC/hug-cartoon.gif';"
        >
    </div>
</div>

<!-- POPUP -->
<div id="popup">
    <div class="popup-content">
        <p>I always need your physical touch in the form of hug, my love ❤️🤗</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
